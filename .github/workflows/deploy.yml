name: Deploy

on:
    push:
        branches: [master]

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Install Tailwind CSS v4
              run: |
                  curl -sLO "https://github.com/tailwindlabs/tailwindcss/releases/download/v4.2.4/tailwindcss-linux-x64"
                  chmod +x tailwindcss-linux-x64
                  sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss

            - name: Install Trunk
              run: |
                  curl -sLO "https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz"
                  tar xzf trunk-x86_64-unknown-linux-gnu.tar.gz
                  sudo mv trunk /usr/local/bin/
                  rm trunk-x86_64-unknown-linux-gnu.tar.gz

            - name: Build
              run: LEKTOR_ENV=production trunk build --release

            - name: Deploy to Cloudflare Workers
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
